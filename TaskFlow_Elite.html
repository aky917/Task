
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow Stable Final</title>

<style>
body{background:#0b1020;color:#e5e7eb;font-family:sans-serif;margin:0}
.wrap{max-width:1800px;margin:auto;padding:20px 40px}

.card{background:#111827;border:1px solid #1f2937;border-radius:10px;padding:14px;margin-bottom:12px}

button,input,select,textarea{
background:#0f172a;border:1px solid #1f2937;color:white;padding:6px;border-radius:6px
}

table{width:100%;table-layout:fixed;border-collapse:collapse}
th,td{padding:6px;border-top:1px solid #1f2937}
th{color:#aaa}

tbody tr:hover{background:#1f2937;cursor:pointer}

th:nth-child(1){width:32%}
th:nth-child(2){width:5%;text-align:center}
th:nth-child(3){width:10%}
th:nth-child(4){width:12%}
th:nth-child(5){width:15%}
th:nth-child(6){width:20%}
th:nth-child(7){width:4%}

td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td:nth-child(6){white-space:normal}

.badge{padding:2px 6px;border-radius:999px;font-size:12px}
.高{background:#7f1d1d}.中{background:#78350f}.低{background:#14532d}

.kanban{display:none;grid-template-columns:repeat(4,1fr);gap:10px}
.task{padding:8px;margin:6px;border-radius:8px;background:#1f2937;cursor:pointer}
.small{font-size:11px;color:#aaa}
</style>

</head>
<body>
<div class="wrap">

<h2>TaskFlow</h2>

<div class="card">
<b>今日の流れ</b><div id="today"></div>
</div>

<div class="card">
<input id="search" placeholder="検索" style="width:100%">
</div>

<div class="card">
<input id="name" placeholder="タスク">
<select id="priority"><option>高</option><option>中</option><option>低</option></select>
<input id="deadline" type="date">
<input id="estimate" type="number">
<input id="memo">
<button id="addBtn">追加</button>
<button onclick="copy()">週報コピー</button>
<button onclick="exportData()">保存</button>
<input type="file" id="file" style="display:none" onchange="importData(event)">
<button onclick="document.getElementById('file').click()">復元</button>
</div>

<div class="card">
<button id="toList">一覧</button>
<button id="toBoard">カンバン</button>
</div>

<div class="card" id="list">
<table>
<thead>
<tr>
<th>タスク</th><th>優先</th><th>状態</th>
<th>期限</th><th>進捗</th><th>メモ</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3 onclick="toggleDone()">完了 (<span id="doneCount"></span>)</h3>
<div id="doneWrap" style="display:none">
<table><tbody id="done"></tbody></table>
</div>

</div>

<div id="board" class="kanban">

<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">
未着手<div id="todo"></div></div>

<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">
進行中<div id="doing"></div></div>

<div class="card" ondrop="drop(event,'待機')" ondragover="allowDrop(event)">
待機<div id="waiting"></div></div>

<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">
完了<div id="doneK"></div></div>

</div>

</div>

<script>

const $=id=>document.getElementById(id);
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
let keyword="";
let showDone=false;

/* 検索 */
$("search").oninput=e=>{
keyword=e.target.value.toLowerCase();
render();
};

/* 追加 */
$("addBtn").onclick=()=>{
if(!$("name").value.trim()) return;

tasks.push({
id:Date.now(),
name:$("name").value,
priority:$("priority").value,
deadline:$("deadline").value,
estimate:+$("estimate").value||1,
progress:0,
memo:$("memo").value,
status:"未着手"
});

["name","deadline","estimate","memo"].forEach(i=>$(i).value="");
save();
};

/* 状態 */
function status(t){
if(t.status==="待機")return"待機";
if(!t.deadline)return"バックログ";
let d=(new Date(t.deadline)-new Date())/86400000;
if(d<0)return"遅延";
if(t.estimate>d)return"危険";
if(d<2)return"注意";
return"正常";
}

/* 今日 */
function today(){
let list=tasks.filter(t=>t.progress<100&&t.deadline);
list.sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));

let h=6,res=[];
list.forEach(t=>{
let need=(t.estimate*6)*(1-t.progress/100);
let use=Math.min(h,need);
if(h>0){res.push(`${t.name}(${Math.round(use)}h)`);h-=use;}
});
$("today").innerHTML=res.join("<br>");
}

/* render */
function render(){

$("tbody").innerHTML="";
$("done").innerHTML="";
["todo","doing","waiting","doneK"].forEach(id=>$(id).innerHTML="");

let doneCount=0;

tasks.forEach(t=>{

if(keyword && !t.name.toLowerCase().includes(keyword)
&& !(t.memo||"").toLowerCase().includes(keyword)) return;

/* 一覧 */
let row=`
<tr>
<td>${t.name}</td>
<td class="badge ${t.priority}">${t.priority}</td>
<td>${status(t)}</td>
<td>${t.deadline||""}</td>
<td>${t.progress}%</td>
<td>${t.memo||""}</td>
<td>
<button onclick="toggleWait(${t.id})">⏸</button>
<button onclick="del(${t.id})">×</button>
</td>
</tr>
`;

if(t.progress==100){
$("done").innerHTML+=row;
doneCount++;
}else{
$("tbody").innerHTML+=row;
}

/* カンバン */
let card=document.createElement("div");
card.className="task";

card.innerHTML=`
<div class="small">${t.deadline||""}</div>
<b>${t.name}</b>
`;

card.draggable=true;
card.ondragstart=e=>e.dataTransfer.setData("id",t.id);

let col=
t.status==="待機"?"waiting":
t.progress==100?"doneK":
t.progress>0?"doing":"todo";

$(col).appendChild(card);

});

$("doneCount").innerText=doneCount;
$("doneWrap").style.display=showDone?"block":"none";

today();
}

/* 操作 */
function toggleWait(id){
let t=tasks.find(x=>x.id==id);
t.status=t.status==="待機"?"進行中":"待機";
save();
}

function del(id){
tasks=tasks.filter(t=>t.id!=id);
save();
}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

function toggleDone(){
showDone=!showDone;
render();
}

/* DnD */
function allowDrop(e){e.preventDefault();}
function drop(e,status){
let id=+e.dataTransfer.getData("id");
let t=tasks.find(x=>x.id==id);

t.status=status;
if(status==="完了")t.progress=100;
save();
}

/* 週報 */
function copy(){
let rows=[["タスク","優先","状態","期限","進捗"]];
tasks.forEach(t=>rows.push([t.name,t.priority,status(t),t.deadline||"",t.progress+"%"]));
navigator.clipboard.writeText(rows.map(r=>r.join("\t")).join("\n"));
alert("コピーOK");
}

/* バックアップ */
function exportData(){
let blob=new Blob([JSON.stringify(tasks)],{type:"app/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

function importData(e){
let r=new FileReader();
r.onload=x=>{
tasks=JSON.parse(x.target.result);
save();
};
r.readAsText(e.target.files[0]);
}

/* 切替 */
$("toList").onclick=()=>{$("list").style.display="block";$("board").style.display="none";}
$("toBoard").onclick=()=>{$("list").style.display="none";$("board").style.display="grid";}

$("toList").click();
render();

</script>
</body>
</html>
