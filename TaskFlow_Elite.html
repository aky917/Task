<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow Ultimate</title>

<style>
body{background:#0b1020;color:#e5e7eb;font-family:Segoe UI;margin:0}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:16px;margin-bottom:14px}

button,input,select{
background:#0f172a;border:1px solid #1f2937;color:white;
padding:8px 12px;border-radius:6px;cursor:pointer
}

.active-tab{background:#3b82f6 !important}

table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-top:1px solid #1f2937}

.badge{padding:2px 6px;border-radius:999px}
.高{background:#7f1d1d}
.中{background:#78350f}
.低{background:#14532d}

.task{padding:8px;margin:6px;border-radius:8px;cursor:pointer;font-size:13px}
.kanban{display:none;grid-template-columns:repeat(3,1fr);gap:10px}

.small{font-size:11px;color:#9ca3af}
</style>
</head>

<body>
<div class="wrap">

<h2>🤖 TaskFlow Ultimate</h2>

<!-- AI -->
<div class="card">
<div id="recommend"></div>
</div>

<div class="card">
<b>📆 今週</b>
<div id="week"></div>
</div>

<!-- 入力 -->
<div class="card">
<input id="name" placeholder="タスク">
<select id="priority">
<option>高</option><option>中</option><option>低</option>
</select>
<input id="deadline" type="date">
<input id="estimate" type="number" placeholder="日数">
<button id="addBtn">追加</button>
</div>

<!-- タブ -->
<div class="card">
<button id="btnTable" onclick="viewTable()">📋 一覧</button>
<button id="btnKanban" onclick="viewKanban()">📊 カンバン</button>
</div>

<!-- 一覧 -->
<div id="tableView" class="card">

<h3>📋 未完了</h3>
<table>
<thead>
<tr>
<th>タスク</th><th>優先</th><th>状態</th><th>期限</th><th>進捗</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3 onclick="toggleDone()" style="cursor:pointer">
✅ 完了 (<span id="doneCount"></span>)
</h3>

<div id="doneWrap">
<table><tbody id="done"></tbody></table>
</div>

</div>

<!-- カンバン -->
<div id="kanbanView" class="kanban">

<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">
<h4>未着手</h4><div id="todo"></div></div>

<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">
<h4>進行中</h4><div id="doing"></div></div>

<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">
<h4>完了</h4><div id="doneK"></div></div>

</div>

<!-- モーダル -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7)">
<div style="background:#111827;padding:20px;max-width:400px;margin:100px auto;border-radius:10px">

<h3>タスク編集</h3>
<input id="m_name"><br><br>

<select id="m_priority">
<option>高</option><option>中</option><option>低</option>
</select><br><br>

<input id="m_deadline" type="date"><br><br>
<input id="m_estimate" type="number"><br><br>
<input id="m_progress" type="number" min="0" max="100"><br><br>

<button onclick="saveModal()">保存</button>
<button onclick="closeModal()">閉じる</button>

</div>
</div>

</div>

<script>
const $=id=>document.getElementById(id);

let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');
let showDone=false;
let currentId=null;

/* AIスコア */
function calcScore(t){
let s=0;
let now=new Date();

if(t.progress<100)s+=100;
if(!t.deadline)s-=120;

if(t.deadline){
let d=(new Date(t.deadline)-now)/86400000;
s+=30-d;
if(t.estimate>d)s+=(t.estimate-d)*20;
}

s+=(100-t.progress)*0.5;
if(t.priority=="高")s+=30;

return s;
}

/* 保存 */
function save(){
tasks.sort((a,b)=>calcScore(b)-calcScore(a));
localStorage.setItem('tasks',JSON.stringify(tasks));
render();recommend();renderWeek();
}

/* 追加 */
addBtn.onclick=()=>{
if(!name.value)return;

tasks.push({
id:Date.now(),
name:name.value,
priority:priority.value,
deadline:deadline.value,
estimate:+estimate.value||1,
progress:0,
parentId:null
});

["name","deadline","estimate"].forEach(id=>$(id).value="");
save();
};

/* 子追加（親のみ） */
function addChild(pid){
let n=prompt("子タスク名");
if(!n)return;

let p=tasks.find(t=>t.id==pid);

tasks.push({
id:Date.now(),
name:n,
priority:p.priority,
deadline:p.deadline,
estimate:1,
progress:0,
parentId:pid
});

save();
}

/* 描画 */
function render(){

tbody.innerHTML="";
done.innerHTML="";
["todo","doing","doneK"].forEach(id=>$(id).innerHTML="");

let parents=tasks.filter(t=>!t.parentId);
let children=tasks.filter(t=>t.parentId);

let count=0;

parents.forEach(p=>{
draw(p,false);
children.filter(c=>c.parentId===p.id)
.forEach(c=>draw(c,true,p));
});

function draw(t,isChild,parent){

let label=isChild?"└ "+t.name:t.name;
let indent=isChild?"padding-left:20px":"";

let row=`
<tr style="${indent}">
<td onclick="openEdit(${t.id})">${label}</td>
<td><span class="badge ${t.priority}">${t.priority}</span></td>
<td>${status(t)}</td>
<td onclick="openEdit(${t.id})">${t.deadline||""}</td>
<td onclick="openEdit(${t.id})">${t.progress}%</td>
<td>
${!t.parentId?`<button onclick="addChild(${t.id})">＋</button>`:""}
<button onclick="del(${t.id})">×</button>
</td>
</tr>
`;

if(t.progress==100){done.innerHTML+=row;count++;}
else{tbody.innerHTML+=row;}

/* カンバン */
if(t.parentId){

let c=document.createElement("div");
c.className="task";
c.style.background=getColor(t);

c.innerHTML=`
<div class="small">${parent.name}</div>
<b>${t.name}</b>
<div class="small">${t.deadline||"なし"} ・ ${t.priority}</div>
<div style="height:4px;background:#000;margin-top:5px;border-radius:3px;">
<div style="width:${t.progress}%;height:100%;background:#3b82f6"></div>
</div>
`;

c.onclick=()=>openEdit(t.id);
c.draggable=true;
c.ondragstart=e=>e.dataTransfer.setData("id",t.id);

let col=(t.progress==100)?"doneK":(t.progress>0?"doing":"todo");
$(col).appendChild(c);

}

}

doneCount.innerText=count;
doneWrap.style.display=showDone?"block":"none";
}

/* ステータス */
function status(t){
if(t.progress==100)return "完了";
if(!t.deadline)return "<span style='color:#9ca3af'>バックログ</span>";

let d=(new Date(t.deadline)-new Date())/86400000;

if(d<0)return "<span style='color:#ef4444'>遅延</span>";
if(t.estimate>d)return "<span style='color:#f97316'>危険</span>";
if(d<2)return "<span style='color:#facc15'>注意</span>";

return "正常";
}

/* AIおすすめ */
function recommend(){
let list=tasks.filter(t=>t.progress<100 && t.deadline);
if(!list.length){$("recommend").innerText="OK";return;}
let best=list[0];
$("recommend").innerHTML=`🔥 今やるべき<br><b onclick="openEdit(${best.id})">${best.name}</b>`;
}

/* 今週 */
function renderWeek(){
let now=new Date();
let list=tasks.filter(t=>{
if(!t.deadline)return false;
let d=new Date(t.deadline);
let diff=(d-now)/86400000;
return diff>=0 && diff<=7;
});
$("week").innerHTML=list.map(t=>`${t.deadline} ${t.name}`).join("<br>")||"なし";
}

/* モーダル */
function openEdit(id){
let t=tasks.find(x=>x.id==id);
currentId=id;
m_name.value=t.name;
m_priority.value=t.priority;
m_deadline.value=t.deadline||"";
m_estimate.value=t.estimate;
m_progress.value=t.progress;
modal.style.display="block";
}

function closeModal(){modal.style.display="none";}

function saveModal(){
let t=tasks.find(x=>x.id==currentId);
t.name=m_name.value;
t.priority=m_priority.value;
t.deadline=m_deadline.value;
t.estimate=+m_estimate.value;
t.progress=+m_progress.value;
closeModal();save();
}

/* ドラッグ */
function allowDrop(e){e.preventDefault();}

function drop(e,status){
let id=+e.dataTransfer.getData("id");
let t=tasks.find(x=>x.id==id);

t.status=status;

if(status==="完了"){t.progress=100;}
else if(status==="未着手"){t.progress=0;}
else if(t.progress==0){t.progress=10;}

save();
}

/* UI */
function toggleDone(){showDone=!showDone;render();}
function del(id){tasks=tasks.filter(t=>t.id!=id);save();}

function viewTable(){
tableView.style.display="block";
kanbanView.style.display="none";
btnTable.classList.add("active-tab");
btnKanban.classList.remove("active-tab");
}

function viewKanban(){
tableView.style.display="none";
kanbanView.style.display="grid";
btnKanban.classList.add("active-tab");
btnTable.classList.remove("active-tab");
}

/* 色 */
function getColor(t){
if(!t.deadline)return "#374151";
let d=(new Date(t.deadline)-new Date())/86400000;
if(d<0)return "#7f1d1d";
if(t.estimate>d)return "#78350f";
if(d<2)return "#92400e";
return "#1f2937";
}

/* キー操作 */
document.addEventListener("keydown",e=>{
if(e.key==="Escape")closeModal();
if(e.key==="Enter" && document.activeElement.id==="name"){
e.preventDefault();addBtn.click();}
});

viewTable();
render();
recommend();
renderWeek();
</script>
</body>
</html>
