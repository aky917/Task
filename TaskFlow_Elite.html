<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow FINAL</title>

<style>
body{background:#0f172a;color:#e5e7eb;font-family:sans-serif;margin:0}
.wrap{max-width:1800px;margin:auto;padding:20px 40px}

.card{
background:#1e293b;
border:1px solid #1f2937;
border-radius:12px;
padding:14px;
margin-bottom:14px
}

button,input,select,textarea{
background:#0f172a;border:1px solid #1f2937;color:white;padding:6px;border-radius:6px
}

/* ✅ 入力バー */
.formbar{
display:flex;
gap:10px;
align-items:end;
flex-wrap:wrap;
}
#name{width:240px;}
#memo{width:200px;}
#estimate{width:70px;}

label{
font-size:11px;
color:#9ca3af;
}

.subbtns{display:flex;gap:6px}

/* ✅ dateアイコン */
input[type="date"]{
color-scheme: dark;
}
input[type="date"]::-webkit-calendar-picker-indicator{
filter: invert(1);
cursor:pointer;
}
input[type="date"]::-webkit-calendar-picker-indicator:hover{
opacity:0.8;
}

/* テーブル */
table{width:100%;table-layout:fixed;border-collapse:collapse}
th,td{padding:8px;border-top:1px solid #1f2937}
th{text-align:left;color:#9ca3af}
tbody tr:hover{background:#273449;cursor:pointer;}

th:nth-child(1){width:32%}
th:nth-child(2),td:nth-child(2){width:5%;text-align:center}
th:nth-child(3){width:10%}
th:nth-child(4){width:12%}
th:nth-child(5){width:15%}
th:nth-child(6){width:20%}
th:nth-child(7){width:4%}

td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td:nth-child(6){white-space:normal}

.badge{display:inline-block;width:12px;height:12px;border-radius:50%;}
.高{background:#ef4444;}
.中{background:#3b82f6;}
.低{background:#22c55e;}

.kanban{display:none;grid-template-columns:repeat(4,1fr);gap:16px}

.task{
padding:8px;margin:6px;border-radius:8px;
cursor:pointer;font-size:12px;
transition:.2s;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.task:hover{transform:scale(1.02);filter:brightness(1.15);}
.task b{font-size:13px}
.small{font-size:10px;color:#9ca3af}
</style>
</head>

<body>
<div class="wrap">

<h2>TaskFlow</h2>

<div class="card">
<b>今日の流れ</b>
<div id="today"></div>
</div>

<div class="card">
<input id="search" placeholder="検索" style="width:100%">
</div>

<!-- ✅ 入力バー -->
<div class="card formbar">

<div>
<label>タスク</label><br>
<input id="name" placeholder="例：資料作成">
</div>

<div>
<label>優先</label><br>
<select id="priority">
<option>高</option><option>中</option><option>低</option>
</select>
</div>

<div>
<label>期限</label><br>
<input id="deadline" type="date">
</div>

<div>
<label>工数(h)</label><br>
<input id="estimate" type="number" step="0.5" placeholder="3">
</div>

<div>
<label>メモ</label><br>
<input id="memo" placeholder="詳細">
</div>

<div>
<button id="addBtn">追加</button>
</div>

<div class="subbtns">
<button onclick="copyReport()">週報</button>
<button onclick="exportTasks()">保存</button>
<input type="file" id="file" style="display:none" onchange="importTasks(event)">
<button onclick="$('file').click()">復元</button>
</div>

</div>

<div class="card">
<button id="btnList">一覧</button>
<button id="btnBoard">カンバン</button>
</div>

<div id="list" class="card">
<table>
<thead>
<tr>
<th>タスク</th><th>優先</th><th>状態</th>
<th>期限</th><th>進捗</th><th>メモ</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3 onclick="toggleDone()">完了 (<span id="doneCount"></span>)</h3>
<div id="doneWrap" style="display:none">
<table><tbody id="done"></tbody></table>
</div>
</div>

<div id="board" class="kanban">
<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">未着手<div id="todo"></div></div>
<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">進行中<div id="doing"></div></div>
<div class="card" ondrop="drop(event,'待機')" ondragover="allowDrop(event)">待機<div id="waiting"></div></div>
<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">完了<div id="doneK"></div></div>
</div>

<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7)">
<div style="background:#111827;padding:20px;margin:100px auto;width:320px">
<input id="m_name"><br><br>
<select id="m_priority"><option>高</option><option>中</option><option>低</option></select><br><br>
<input id="m_deadline" type="date"><br><br>
<input id="m_estimate"><br><br>
<input id="m_progress"><br><br>
<textarea id="m_memo"></textarea><br><br>
<button onclick="saveModal()">保存</button>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

</div>

<script>
const $=id=>document.getElementById(id);
const DAY_HOURS = 8;

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
let keyword="",currentId=null,showDone=false;

/* Enter追加 */
["name","estimate","memo"].forEach(id=>{
$(id).addEventListener("keydown",e=>{
if(e.key==="Enter") $("addBtn").click();
});
});

/* 検索 */
$("search").oninput=e=>{
keyword=e.target.value.toLowerCase();
render();
};

/* 追加 */
$("addBtn").onclick=()=>{
if(!$("name").value.trim()) return;

tasks.push({
id:Date.now(),
name:$("name").value,
priority:$("priority").value,
deadline:$("deadline").value,
estimate:+$("estimate").value||1,
progress:0,
memo:$("memo").value,
status:"未着手"
});

["name","deadline","estimate","memo"].forEach(i=>$(i).value="");

save();
$("name").focus();
};

/* 状態 */
function status(t){
if(t.status==="待機") return "<span style='color:#60a5fa'>待機</span>";
if(!t.deadline) return "バックログ";

let d=(new Date(t.deadline)-new Date())/86400000 * DAY_HOURS;

if(d<0) return "<span style='color:#ef4444'>遅延</span>";
if(t.estimate>d) return "<span style='color:#facc15'>危険</span>";
if(d<DAY_HOURS*2) return "<span style='color:#f59e0b'>注意</span>";

return "正常";
}

/* 今日（バランス型） */
function renderToday(){
let list=tasks.filter(t=>t.progress<100 && t.deadline);

list.sort((a,b)=>{
let da=(new Date(a.deadline)-new Date())/86400000 * DAY_HOURS;
let db=(new Date(b.deadline)-new Date())/86400000 * DAY_HOURS;
return (da-a.estimate)-(db-b.estimate);
});

let h=DAY_HOURS,today=[],carry=[],carryHours=0;

for(let t of list){
let remain=t.estimate*(1-t.progress/100);
if(remain<=0) continue;

if(h>0){
let use=Math.min(h,remain);
today.push(`・${t.name} (${use.toFixed(1)}h)`);
h-=use;

if(remain>use){
let rest=remain-use;
carry.push(`・${t.name} 残り ${rest.toFixed(1)}h`);
carryHours+=rest;
}
}else{
carry.push(`・${t.name} (${remain.toFixed(1)}h)`);
carryHours+=remain;
}
}

const MAX_CARRY = 3;

let carryText="";
if(carry.length){
carryText =
"<hr>明日以降<br>" +
carry.slice(0, MAX_CARRY).join("<br>") +
(carry.length > MAX_CARRY ? "<br>…" : "") +
`<br><span style="color:#9ca3af">合計 ${carryHours.toFixed(1)}h</span>`;
}

$("today").innerHTML=(today.join("<br>")||"なし")+carryText;
}

/* 描画 */
function render(){
$("tbody").innerHTML="";
$("done").innerHTML="";

tasks.forEach(t=>{
if(keyword && !t.name.toLowerCase().includes(keyword)) return;

let remain=t.estimate*(1-t.progress/100);

let row=`
<tr>
<td onclick="edit(${t.id})">${t.name}</td>
<td><span class="badge ${t.priority}"></span></td>
<td>${status(t)}</td>
<td>${t.deadline||""}</td>
<td>${t.progress}% (${remain.toFixed(1)}h)</td>
<td>${t.memo||""}</td>
<td>
<button onclick="toggleWait(${t.id});event.stopPropagation()">⏸</button>
<button onclick="del(${t.id});event.stopPropagation()">×</button>
</td>
</tr>`;

if(t.progress==100) $("done").innerHTML+=row;
else $("tbody").innerHTML+=row;
});

renderToday();
}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

$("btnList").click();
render();
</script>
</body>
</html>
