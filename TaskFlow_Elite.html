<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow Ultimate Balanced</title>

<style>
body{background:#0b1020;color:#e5e7eb;font-family:Segoe UI;margin:0}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:16px;margin-bottom:14px}

button,input,select,textarea{
background:#0f172a;border:1px solid #1f2937;color:white;padding:8px;border-radius:6px
}

.active-tab{background:#3b82f6 !important}

table{width:100%;border-collapse:collapse}
th{color:#9ca3af;text-align:left;padding:8px;font-weight:normal}
td{padding:8px;border-top:1px solid #1f2937}

.badge{padding:2px 6px;border-radius:999px;font-size:12px}
.高{background:#7f1d1d}.中{background:#78350f}.低{background:#14532d}

.task{padding:8px;margin:6px;border-radius:8px;font-size:13px;cursor:pointer}
.kanban{display:none;grid-template-columns:repeat(4,1fr);gap:10px}
.small{font-size:11px;color:#9ca3af}
</style>
</head>

<body>
<div class="wrap">

<h2>🤖 TaskFlow Ultimate</h2>

<div class="card">
<b>🕒 今日の流れ</b>
<div id="todaySchedule"></div>
</div>

<div class="card">
<b>📆 今週</b>
<div id="week"></div>
</div>

<div class="card">
<input id="name" placeholder="タスク">
<select id="priority"><option>高</option><option>中</option><option>低</option></select>
<input id="deadline" type="date">
<input id="estimate" type="number">
<input id="memo">
<button id="addBtn">追加</button>
</div>

<div class="card">
<button id="btnTable">📋 一覧</button>
<button id="btnKanban">📊 カンバン</button>
</div>

<!-- 一覧 -->
<div id="tableView" class="card">
<table>
<thead>
<tr>
<th>タスク</th><th>優先</th><th>状態</th>
<th>期限</th><th>進捗</th><th>メモ</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- カンバン -->
<div id="kanbanView" class="kanban">

<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">
<h4>未着手</h4><div id="todo"></div>
</div>

<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">
<h4>進行中</h4><div id="doing"></div>
</div>

<div class="card" ondrop="drop(event,'待機')" ondragover="allowDrop(event)">
<h4>待機</h4><div id="waiting"></div>
</div>

<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">
<h4>完了</h4><div id="doneK"></div>
</div>

</div>

<script>
const $=id=>document.getElementById(id);

let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');

/* ===== AIスコア ===== */
function calcScore(t){
let s=0, now=new Date();

if(t.progress<100)s+=100;
if(!t.deadline)s-=200;

if(t.deadline){
let d=(new Date(t.deadline)-now)/86400000;
s+=80-d*5;
if(d<0)s+=200;
if(t.estimate>d)s+=(t.estimate-d)*30;
}

if(t.progress>0&&t.progress<100)s+=40;
if(t.status==="待機")s-=100;

return s;
}

/* ===== 状態 ===== */
function status(t){
if(t.status==="待機") return "🔵待機";
if(t.progress===100) return "✅完了";
if(!t.deadline) return "⚪";
let d=(new Date(t.deadline)-new Date())/86400000;
if(d<0) return "🔴遅延";
if(t.estimate>d) return "🟠危険";
if(d<2) return "🟡注意";
return "✅正常";
}

/* ===== 残日数 ===== */
function remain(t){
let r=Math.round(t.estimate*(1-t.progress/100));
return r<0?`<span style="color:#ef4444">${r}</span>`:r;
}

/* ===== 今日の流れ ===== */
function renderTodaySchedule(){

let list=tasks.filter(t=>t.progress<100&&t.deadline);
list.sort((a,b)=>calcScore(b)-calcScore(a));

let remainH=6;
let res=[];

for(let t of list){
if(remainH<=0) break;

let total=t.estimate*6;
let rem=total*(1-t.progress/100);

let use=Math.min(rem,remainH);
if(use<=0) continue;

res.push(`・${t.name}（${Math.round(use)}h）`);
remainH-=use;
}

todaySchedule.innerHTML=res.join("<br>")||"なし";
}

/* ===== 描画 ===== */
function render(){

tbody.innerHTML="";
["todo","doing","waiting","doneK"].forEach(id=>$(id).innerHTML="");

tasks.sort((a,b)=>calcScore(b)-calcScore(a));

tasks.forEach(t=>{

/* 一覧 */
let row=`
<tr>
<td>${t.name}</td>
<td><span class="badge ${t.priority}">${t.priority}</span></td>
<td>${status(t)}</td>
<td>${t.deadline||""}</td>
<td>${t.progress}%（残 ${remain(t)}日）</td>
<td>${t.memo||""}</td>
</tr>
`;
tbody.innerHTML+=row;

/* カンバン */
let c=document.createElement("div");
c.className="task";
c.style.background=getColor(t);

c.innerHTML=`
<b>${t.name}</b>
<div class="small">${t.deadline||""}</div>
<div style="height:4px;background:#000;margin-top:5px">
<div style="width:${t.progress}%;height:100%;background:#3b82f6"></div>
</div>
`;

c.draggable=true;
c.ondragstart=e=>e.dataTransfer.setData("id",t.id);

/* 列 */
let col=
t.status==="待機"?"waiting":
t.progress===100?"doneK":
t.progress>0?"doing":"todo";

$(col).appendChild(c);

});

renderTodaySchedule();
}

/* ===== 色 ===== */
function getColor(t){
if(t.status==="待機") return "#1e3a8a";

let d=(new Date(t.deadline)-new Date())/86400000;

if(d<0) return "#7f1d1d";
if(t.estimate>d) return "#78350f";
if(d<2) return "#92400e";
return "#1f2937";
}

/* ===== 追加 ===== */
$("addBtn").onclick=()=>{
tasks.push({
id:Date.now(),
name:name.value,
priority:priority.value,
deadline:deadline.value,
estimate:+estimate.value||1,
progress:0,
memo:memo.value,
status:"未着手"
});
save();
};

/* ===== 保存 ===== */
function save(){
localStorage.setItem('tasks',JSON.stringify(tasks));
render();
}

/* ===== DnD ===== */
function allowDrop(e){e.preventDefault();}
function drop(e,s){
let id=+e.dataTransfer.getData("id");
let t=tasks.find(x=>x.id==id);
t.status=s;
if(s==="完了")t.progress=100;
save();
}

/* ===== タブ ===== */
btnTable.onclick=()=>{
tableView.style.display="block";
kanbanView.style.display="none";
};

btnKanban.onclick=()=>{
tableView.style.display="none";
kanbanView.style.display="grid";
};

btnTable.click();
render();
</script>
</body>
</html>
