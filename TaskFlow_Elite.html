<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow AI Pro</title>

<style>
body{
  margin:0;
  background:#0b1020;
  color:#e5e7eb;
  font-family:Segoe UI;
}

.wrap{max-width:1100px;margin:auto;padding:20px;}

.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
}

button,input,select{
  background:#0f172a;
  border:1px solid #1f2937;
  color:white;
  padding:6px;
  border-radius:6px;
}

button{cursor:pointer;}

table{width:100%;border-collapse:collapse;}
td{border-top:1px solid #1f2937;padding:8px;}

.task{
  padding:8px;
  margin:5px;
  border-radius:8px;
  background:#1f2937;
  cursor:grab;
}

.small{font-size:12px;color:#9ca3af;}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

</style>
</head>

<body>
<div class="wrap">

<h2>TaskFlow AI Pro</h2>

<!-- KPI -->
<div class="card">
総:<span id="kpiTotal"></span> /
進:<span id="kpiDoing"></span> /
完:<span id="kpiDone"></span> /
遅:<span id="kpiDelay"></span> /
保:<span id="kpiBacklog"></span>
</div>

<!-- 推薦 -->
<div class="card"><div id="recommend"></div></div>

<!-- 今週 -->
<div class="card"><div id="weekTasks"></div></div>

<!-- 入力 -->
<div class="card">
<input id="name" placeholder="タスク">
<select id="priority"><option>高</option><option>中</option><option>低</option></select>
<input id="deadline" type="date">
<input id="estimate" type="number" placeholder="日数">
<input id="progressNum" value="0">
<button id="addBtn">追加</button>
</div>

<!-- 操作 -->
<div class="card">
<button id="aiBtn">AI整理</button>
<button onclick="viewTable()">一覧</button>
<button onclick="viewKanban()">カンバン</button>
</div>

<!-- 一覧 -->
<div id="tableView" class="card">
<table>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- バックログ -->
<div class="card">
<h3>🗂 backlog</h3>
<table><tbody id="backlogList"></tbody></table>
</div>

<!-- 完了 -->
<div class="card">
<h3>✅ 完了</h3>
<table><tbody id="doneList"></tbody></table>
</div>

<!-- カンバン -->
<div id="kanbanView" class="kanban" style="display:none;">

<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">
<h4>未着手</h4><div id="todo"></div></div>

<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">
<h4>進行</h4><div id="doing"></div></div>

<div class="card" ondrop="drop(event,'待機')" ondragover="allowDrop(event)">
<h4>待機</h4><div id="waiting"></div></div>

<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">
<h4>完了（最近）</h4><div id="kanbanDone"></div></div>

</div>

<!-- ログ -->
<div class="card">
<h3>🕓 ログ</h3>
<div id="logList"></div>
</div>

</div>

<script>
const $=id=>document.getElementById(id);

let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');
let logs=JSON.parse(localStorage.getItem('logs')||'[]');

/* 保存 */
function save(){
  localStorage.setItem('tasks',JSON.stringify(tasks));
  render();
  renderKPI();
  recommend();
  renderWeek();
  renderLogs();
}

/* ログ */
function addLog(text){
  logs.unshift({time:new Date().toLocaleString(),text});
  logs=logs.slice(0,20);
  localStorage.setItem('logs',JSON.stringify(logs));
}

function renderLogs(){
  $("logList").innerHTML=logs.map(l=>`${l.time} - ${l.text}`).join("<br>");
}

/* 追加 */
$("addBtn").onclick=()=>{
  if(!$("name").value.trim())return;

  let t={
    id:Date.now(),
    name:$("name").value,
    priority:$("priority").value,
    deadline:$("deadline").value,
    estimate:+$("estimate").value||1,
    progress:+$("progressNum").value||0,
    status:"未着手"
  };

  tasks.push(t);
  addLog("追加:"+t.name);
  save();
};

/* AI */
function calcScore(t){
  let s=0,now=new Date();

  if(t.progress<100)s+=100;
  if(!t.deadline)s-=120;

  if(t.deadline){
    let d=(new Date(t.deadline)-now)/86400000;
    s+=30-d;
    if(t.estimate>d)s+=(t.estimate-d)*20;
  }

  return s;
}

$("aiBtn").onclick=()=>{
  tasks.sort((a,b)=>{
    if(!a.deadline&&b.deadline)return 1;
    if(a.deadline&&!b.deadline)return -1;
    return calcScore(b)-calcScore(a);
  });
  save();
};

/* KPI */
function renderKPI(){
  $("kpiTotal").innerText=tasks.length;
  $("kpiDone").innerText=tasks.filter(t=>t.progress==100).length;
  $("kpiDoing").innerText=tasks.filter(t=>t.progress>0&&t.progress<100).length;
  $("kpiBacklog").innerText=tasks.filter(t=>!t.deadline).length;

  $("kpiDelay").innerText=tasks.filter(t=>
    t.deadline&&new Date(t.deadline)<new Date()&&t.progress<100
  ).length;
}

/* 推薦 */
function recommend(){
  let list=tasks.filter(t=>t.deadline&&t.progress<100);
  if(!list.length)return $("recommend").innerText="OK";

  let best=list.sort((a,b)=>calcScore(b)-calcScore(a))[0];
  $("recommend").innerText="👉 "+best.name;
}

/* 今週 */
function renderWeek(){
  let now=new Date();
  let list=tasks.filter(t=>{
    if(!t.deadline)return false;
    let d=new Date(t.deadline);
    let diff=(d-now)/86400000;
    return diff>=0&&diff<=7;
  });

  $("weekTasks").innerHTML=list.map(t=>t.deadline+" "+t.name).join("<br>")||"なし";
}

/* 完了期限 */
function isRecent(t){
  if(!t.completedAt)return false;
  return (new Date()-new Date(t.completedAt))<7*86400000;
}

/* render */
function render(){
  $("tbody").innerHTML="";
  $("doneList").innerHTML="";
  $("backlogList").innerHTML="";
  ["todo","doing","waiting","kanbanDone"].forEach(id=>$(id).innerHTML="");

  tasks.forEach(t=>{

    let row=`<tr>
<td>${t.name}</td>
<td>${t.deadline||""}</td>
<td>${t.progress}%</td>
<td><button onclick="del(${t.id})">×</button></td>
</tr>`;

    if(!t.deadline) $("backlogList").innerHTML+=row;
    else if(t.progress==100) $("doneList").innerHTML+=row;
    else $("tbody").innerHTML+=row;

    let c=document.createElement("div");
    c.className="task";
    c.textContent=t.name+" "+t.progress+"%";
    c.draggable=true;
    c.ondragstart=e=>e.dataTransfer.setData("id",t.id);

    if(t.status=="完了" && isRecent(t)){
      $("kanbanDone").appendChild(c);
    }else if(t.status!="完了"){
      let col={未着手:"todo",進行中:"doing",待機:"waiting"}[t.status];
      if(col) $(col).appendChild(c);
    }

  });

}

/* 更新 */
function updateProgress(id,v){
  let t=tasks.find(x=>x.id==id);
  t.progress=+v;

  if(v==100){
    t.status="完了";
    t.completedAt=new Date().toISOString();
    addLog("完了:"+t.name);
  }

  save();
}

/* 削除 */
function del(id){
  let t=tasks.find(x=>x.id==id);
  addLog("削除:"+t.name);
  tasks=tasks.filter(x=>x.id!=id);
  save();
}

/* DnD */
function allowDrop(e){e.preventDefault();}

function drop(e,status){
  let id=+e.dataTransfer.getData("id");
  let t=tasks.find(x=>x.id==id);

  t.status=status;

  if(status==="完了"){
    t.progress=100;
    t.completedAt=new Date().toISOString();
    addLog("完了:"+t.name);
  }

  if(status==="未着手")t.progress=0;

  save();
}

/* view */
function viewTable(){
  $("tableView").style.display="block";
  $("kanbanView").style.display="none";
}
function viewKanban(){
  $("tableView").style.display="none";
  $("kanbanView").style.display="grid";
}

/* init */
render();
renderKPI();
recommend();
renderWeek();
renderLogs();

</script>
</body>
</html>
