<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow FINAL</title>

<style>
body{background:#0f172a;color:#e5e7eb;font-family:sans-serif;margin:0}
.wrap{max-width:1800px;margin:auto;padding:20px 40px}

.card{
background:#1e293b;
border:1px solid #1f2937;
border-radius:12px;
padding:14px;
margin-bottom:14px
}

button,input,select,textarea{
background:#0f172a;border:1px solid #1f2937;color:white;padding:6px;border-radius:6px
}

/* テーブル */
table{width:100%;table-layout:fixed;border-collapse:collapse}
th,td{padding:8px;border-top:1px solid #1f2937}
th{text-align:left;color:#9ca3af}

tbody tr:hover{
background:#273449;
cursor:pointer;
}

/* 列 */
th:nth-child(1){width:32%}
th:nth-child(2),td:nth-child(2){width:5%;text-align:center}
th:nth-child(3){width:10%}
th:nth-child(4){width:12%}
th:nth-child(5){width:15%}
th:nth-child(6){width:20%}
th:nth-child(7){width:4%}

/* テキスト */
td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td:nth-child(6){white-space:normal}

/* ✅ 優先（丸＋色分離） */
.badge{
display:inline-block;
width:12px;
height:12px;
border-radius:50%;
}
.高{background:#ef4444;}  /* 赤 */
.中{background:#3b82f6;}  /* 青 */
.低{background:#22c55e;}  /* 緑 */

/* カンバン */
.kanban{display:none;grid-template-columns:repeat(4,1fr);gap:16px}

.task{
padding:8px;margin:6px;border-radius:8px;
cursor:pointer;font-size:12px;
transition:.2s
}

.task:hover{
transform:scale(1.02);
filter:brightness(1.15);
}

.task b{font-size:13px}
.small{font-size:10px;color:#9ca3af}

</style>
</head>

<body>
<div class="wrap">

<h2>TaskFlow</h2>

<div class="card">
<b>今日の流れ</b>
<div id="today"></div>
</div>

<div class="card">
<input id="search" placeholder="検索" style="width:100%">
</div>

<div class="card">
<input id="name">
<select id="priority">
<option>高</option>
<option>中</option>
<option>低</option>
</select>
<input id="deadline" type="date">
<input id="estimate" type="number">
<input id="memo">

<button id="addBtn">追加</button>
<button onclick="copyReport()">週報</button>
<button onclick="exportTasks()">保存</button>

<input type="file" id="file" style="display:none" onchange="importTasks(event)">
<button onclick="$('file').click()">復元</button>
</div>

<div class="card">
<button id="btnList">一覧</button>
<button id="btnBoard">カンバン</button>
</div>

<!-- 一覧 -->
<div id="list" class="card">
<table>
<thead>
<tr>
<th>タスク</th><th>優先</th><th>状態</th>
<th>期限</th><th>進捗</th><th>メモ</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h3 onclick="toggleDone()">完了 (<span id="doneCount"></span>)</h3>
<div id="doneWrap" style="display:none">
<table><tbody id="done"></tbody></table>
</div>
</div>

<!-- カンバン -->
<div id="board" class="kanban">
<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">未着手<div id="todo"></div></div>
<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">進行中<div id="doing"></div></div>
<div class="card" ondrop="drop(event,'待機')" ondragover="allowDrop(event)">待機<div id="waiting"></div></div>
<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">完了<div id="doneK"></div></div>
</div>

<!-- モーダル -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7)">
<div style="background:#111827;padding:20px;margin:100px auto;width:320px">
<input id="m_name"><br><br>
<select id="m_priority"><option>高</option><option>中</option><option>低</option></select><br><br>
<input id="m_deadline" type="date"><br><br>
<input id="m_estimate"><br><br>
<input id="m_progress"><br><br>
<textarea id="m_memo"></textarea><br><br>
<button onclick="saveModal()">保存</button>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

</div>

<script>

const $=id=>document.getElementById(id);

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
let keyword="";
let currentId=null;
let showDone=false;

/* 検索 */
$("search").oninput=e=>{
keyword=e.target.value.toLowerCase();
render();
};

/* ✅ 追加（修正済） */
$("addBtn").onclick=()=>{
if(!$("name").value.trim()) return;

tasks.push({
id:Date.now(),
name:$("name").value,
priority:$("priority").value,
deadline:$("deadline").value,
estimate:+$("estimate").value||1,
progress:0,
memo:$("memo").value,
status:"未着手"
});

["name","deadline","estimate","memo"].forEach(i=>$(i).value="");

save();
};

/* 状態 */
function status(t){
if(t.status==="待機") return "<span style='color:#60a5fa'>待機</span>";
if(!t.deadline) return "バックログ";

let d=(new Date(t.deadline)-new Date())/86400000;

if(d<0) return "<span style='color:#ef4444'>遅延</span>";
if(t.estimate>d) return "<span style='color:#facc15'>危険</span>";
if(d<2) return "<span style='color:#f59e0b'>注意</span>";

return "正常";
}

/* カンバン色 */
function color(t){
if(t.status==="待機") return "#1e40af";

let d=(new Date(t.deadline)-new Date())/86400000;

if(d<0) return "#dc2626";
if(t.estimate>d) return "#eab308";
if(d<2) return "#f59e0b";

return "#1f2937";
}

/* 並び替え */
function sortTasks(){
tasks.sort((a,b)=>{
if(!a.deadline && b.deadline) return 1;
if(a.deadline && !b.deadline) return -1;

let da=(new Date(a.deadline)-new Date())/86400000;
let db=(new Date(b.deadline)-new Date())/86400000;

return (da-a.estimate)-(db-b.estimate);
});
}

/* 今日 */
function renderToday(){
let list=tasks.filter(t=>t.progress<100 && t.deadline);

list.sort((a,b)=>{
let da=(new Date(a.deadline)-new Date())/86400000;
let db=(new Date(b.deadline)-new Date())/86400000;
return (da-a.estimate)-(db-b.estimate);
});

let h=6,res=[];

for(let t of list){
if(h<=0) break;
let use=Math.min(h,(t.estimate*(1-t.progress/100)*6));
if(use<=0) continue;
res.push(`・${t.name} (${Math.round(use)}h)`);
h-=use;
}

$("today").innerHTML=res.join("<br>")||"なし";
}

/* 描画 */
function render(){

sortTasks();

$("tbody").innerHTML="";
$("done").innerHTML="";
["todo","doing","waiting","doneK"].forEach(id=>$(id).innerHTML="");

let doneNum=0;

tasks.forEach(t=>{

if(keyword &&
!t.name.toLowerCase().includes(keyword) &&
!(t.memo||"").toLowerCase().includes(keyword)) return;

/* 一覧 */
let row=`
<tr>
<td onclick="edit(${t.id})">${t.name}</td>
<td><span class="badge ${t.priority}" title="${t.priority}"></span></td>
<td>${status(t)}</td>
<td>${t.deadline||""}</td>
<td>${t.progress}%</td>
<td>${t.memo||""}</td>
<td>
<button onclick="toggleWait(${t.id});event.stopPropagation()">⏸</button>
<button onclick="del(${t.id});event.stopPropagation()">×</button>
</td>
</tr>`;

if(t.progress==100){$("done").innerHTML+=row;doneNum++;}
else{$("tbody").innerHTML+=row;}

/* カンバン */
let c=document.createElement("div");
c.className="task";
c.style.background=color(t);
c.onclick=()=>edit(t.id);

c.innerHTML=`
<div class="small">
<span class="badge ${t.priority}"></span> ${t.deadline||""}
</div>
<b>${t.name}</b>`;

c.draggable=true;
c.ondragstart=e=>e.dataTransfer.setData("id",t.id);

let col=t.status==="待機"?"waiting":
t.progress==100?"doneK":
t.progress>0?"doing":"todo";

$(col).appendChild(c);

});

$("doneCount").innerText=doneNum;
$("doneWrap").style.display=showDone?"block":"none";

renderToday();
}

/* 操作 */
function edit(id){
let t=tasks.find(x=>x.id==id);
currentId=id;

$("m_name").value=t.name;
$("m_priority").value=t.priority;
$("m_deadline").value=t.deadline||"";
$("m_estimate").value=t.estimate;
$("m_progress").value=t.progress;
$("m_memo").value=t.memo||"";

$("modal").style.display="block";
}

function saveModal(){
let t=tasks.find(x=>x.id==currentId);

t.name=$("m_name").value;
t.priority=$("m_priority").value;
t.deadline=$("m_deadline").value;
t.estimate=+$("m_estimate").value;
t.progress=+$("m_progress").value;
t.memo=$("m_memo").value;

closeModal();
save();
}

function closeModal(){ $("modal").style.display="none"; }

function toggleWait(id){
let t=tasks.find(x=>x.id==id);
t.status=t.status==="待機"?"進行中":"待機";
save();
}

function del(id){
tasks=tasks.filter(t=>t.id!=id);
save();
}

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
}

function toggleDone(){
showDone=!showDone;
render();
}

function allowDrop(e){e.preventDefault();}

function drop(e,s){
let id=+e.dataTransfer.getData("id");
let t=tasks.find(x=>x.id==id);
t.status=s;
if(s==="完了") t.progress=100;
save();
}

/* バックアップ */
function exportTasks(){
let blob=new Blob([JSON.stringify(tasks,null,2)]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

function importTasks(e){
if(!confirm("上書きします")) return;
let r=new FileReader();
r.onload=x=>{tasks=JSON.parse(x.target.result);save();};
r.readAsText(e.target.files[0]);
}

/* 週報 */
function copyReport(){
let rows=[["タスク","優先","状態","期限","進捗"]];
tasks.forEach(t=>{
rows.push([
t.name,
t.priority,
status(t).replace(/<[^>]+>/g,""),
t.deadline||"",
t.progress+"%"
]);
});
navigator.clipboard.writeText(rows.map(r=>r.join("\t")).join("\n"));
alert("コピーOK");
}

/* UI */
$("btnList").onclick=()=>{
$("list").style.display="block";
$("board").style.display="none";
};

$("btnBoard").onclick=()=>{
$("list").style.display="none";
$("board").style.display="grid";
};

$("btnList").click();
render();

</script>
</body>
</html>
