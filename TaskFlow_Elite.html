<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow AI Pro</title>

<style>
:root{
--bg:#0f172a;
--panel:#111827;
--border:#1f2937;
--text:#e5e7eb;
--accent:#2563eb;
--danger:#dc2626;
--success:#16a34a;
}

body{
  margin:0;
  font-family:Segoe UI;
  background:var(--bg);
  color:var(--text);
}

.wrap{max-width:1200px;margin:auto;padding:20px;}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
}

.form{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr 1fr 2fr auto;
  gap:6px;
}

input,select{
  background:#0b1220;
  border:1px solid var(--border);
  color:white;
  padding:6px;
  border-radius:6px;
}

button{
  background:#1f2937;
  color:white;
  border:none;
  padding:6px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{background:#374151;}
.primary{background:var(--accent);}

table{width:100%;border-collapse:collapse;}
th,td{text-align:left;padding:8px;border-bottom:1px solid var(--border);}
tr:hover{background:#1f2937;}

.badge{padding:2px 6px;border-radius:10px;font-size:12px;}
.高{background:var(--danger);}
.中{background:#d97706;}
.低{background:var(--success);}

.progress{height:6px;background:#374151;border-radius:10px;}
.fill{height:100%;background:var(--accent);}

.kanban{display:none;grid-template-columns:repeat(3,1fr);gap:8px;}
.task{background:#1f2937;margin:4px;padding:5px;border-radius:6px;}

#recommendBox{
  border:1px solid var(--accent);
}

#doneList tr{
  opacity:0.6;
}

input[type="range"]{width:90px;}
</style>
</head>

<body>
<div class="wrap">

<h2>🤖 TaskFlow AI Pro</h2>

<!-- おすすめ -->
<div class="card" id="recommendBox">
<b>🔥 今やるべきタスク</b>
<div id="recommend">なし</div>
</div>

<!-- 入力 -->
<div class="card form">
<input id="name" placeholder="タスク">
<select id="priority"><option>高</option><option selected>中</option><option>低</option></select>
<input id="deadline" type="date">
<input id="estimate" type="number" placeholder="必要日数">
<input id="progressNum" type="number" value="0">
<input id="memo" placeholder="メモ">
<button id="addBtn" class="primary">＋</button>
</div>

<!-- 操作 -->
<div class="card">
<input id="search" placeholder="検索">
<button id="aiBtn">🤖整理</button>
<button id="tableBtn">一覧</button>
<button id="kanbanBtn">カンバン</button>
</div>

<!-- テーブル -->
<div id="tableView" class="card">
<table>
<thead>
<tr>
<th>タスク</th><th>優先</th><th>期限</th><th>進捗</th><th>⚠️</th><th>🔥</th><th>メモ</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<!-- 完了 -->
<div class="card">
<h3>✅ 完了タスク</h3>
<table>
<tbody id="doneList"></tbody>
</table>
</div>

<!-- カンバン -->
<div id="kanbanView" class="kanban">
<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">
<h4>未着手</h4><div id="todo"></div></div>

<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">
<h4>進行中</h4><div id="doing"></div></div>

<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">
<h4>完了</h4><div id="done"></div></div>
</div>

</div>

<script>
const $=id=>document.getElementById(id);

let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');

function save(){
  localStorage.setItem('tasks',JSON.stringify(tasks));
  render();
  recommend();
}

/* トースト */
function toast(msg){
  let t=document.createElement("div");
  t.textContent=msg;
  t.style.position="fixed";
  t.style.bottom="20px";
  t.style.right="20px";
  t.style.background="#2563eb";
  t.style.padding="10px";
  t.style.color="white";
  t.style.borderRadius="8px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}

/* 追加 */
$("addBtn").onclick=()=>{
  if(!$("name").value.trim()) return alert("名前必須");

  let p=+$("progressNum").value||0;

  tasks.push({
    id:Date.now(),
    name:$("name").value,
    priority:$("priority").value,
    deadline:$("deadline").value,
    estimate:+$("estimate").value||1,
    progress:p,
    memo:$("memo").value,
    created:new Date().toISOString(),
    status:p==0?'未着手':p==100?'完了':'進行中'
  });

  $("name").value='';
  save();
  toast("追加");
};

/* 進捗更新 */
function updateProgress(id,val){
  let t=tasks.find(x=>x.id==id);
  let p=Math.max(0,Math.min(100,+val||0));

  t.progress=p;
  t.status=(p==0?'未着手':p==100?'完了':'進行中');

  save();
}

/* AI整理 */
$("aiBtn").onclick=()=>{
  tasks.forEach(t=>{
    if(t.deadline){
      let diff=(new Date(t.deadline)-new Date())/(1000*60*60*24);
      t.priority=diff<1?'高':diff<3?'中':'低';
    }
  });
  save();
  toast("AI整理");
};

/* 危険判定 */
function isRisk(t){
  if(!t.deadline||!t.estimate)return false;
  let diff=(new Date(t.deadline)-new Date())/(1000*60*60*24);
  return t.estimate>diff;
}

/* スコア */
function score(t){
  let s=0;
  if(t.progress<100)s+=50;
  if(t.deadline){
    let d=(new Date(t.deadline)-new Date())/(1000*60*60*24);
    s+=(10-d);
    if(t.estimate)s+=(t.estimate-d)*5;
  }
  if(t.priority=='高')s+=20;
  return s;
}

/* おすすめ */
function recommend(){
  let active=tasks.filter(t=>t.progress<100);
  if(!active.length){$("recommend").innerText="🎉 完了";return;}
  let best=active.sort((a,b)=>score(b)-score(a))[0];

  $("recommend").innerHTML=
`<b>${best.name}</b><br>
期限:${best.deadline||'-'} / 優先:${best.priority} / ${best.progress}%`;
}

/* render */
function render(){
  let q=$("search").value.toLowerCase();

  let arr=tasks.filter(t=>t.name.toLowerCase().includes(q));

  $("tbody").innerHTML='';
  $("doneList").innerHTML='';
  $("todo").innerHTML='';
  $("doing").innerHTML='';
  $("done").innerHTML='';

  let today=new Date().toISOString().split('T')[0];

  arr.forEach(t=>{
    let overdue=t.deadline&&t.deadline<today&&t.progress<100;

    let row=`
<tr style="${overdue?'background:#3f1d1d':''}">
<td contenteditable onblur="edit(${t.id},this.innerText)">${t.name}</td>
<td><span class="badge ${t.priority}">${t.priority}</span></td>
<td>${t.deadline||''}</td>
<td>
<input type="range" min="0" max="100" value="${t.progress}" oninput="updateProgress(${t.id},this.value)">
<input type="number" value="${t.progress}" style="width:50px" oninput="updateProgress(${t.id},this.value)">%
</td>
<td>${overdue?'⚠️':''}</td>
<td>${isRisk(t)?'🔥':''}</td>
<td style="font-size:12px;color:#9ca3af;">${t.memo||''}</td>
<td><button onclick="del(${t.id})">🗑</button></td>
</tr>
`;

    if(t.progress==100) $("doneList").innerHTML+=row;
    else $("tbody").innerHTML+=row;

    let c=document.createElement('div');
    c.className='task';
    c.textContent=t.name;
    c.draggable=true;
    c.ondragstart=e=>e.dataTransfer.setData("id",t.id);

    let col=t.status=='未着手'?'todo':t.status=='進行中'?'doing':'done';
    $(col).appendChild(c);
  });
}

/* 編集 */
function edit(id,val){
  let t=tasks.find(x=>x.id==id);
  t.name=val;
  save();
}

/* 削除 */
function del(id){
  tasks=tasks.filter(t=>t.id!=id);
  save();
  toast("削除");
}

/* DnD */
function allowDrop(e){e.preventDefault();}
function drop(e,status){
  e.preventDefault();
  let id=+e.dataTransfer.getData("id");
  let t=tasks.find(x=>x.id==id);
  t.status=status;
  t.progress=status=='完了'?100:status=='未着手'?0:50;
  save();
}

/* view */
$("kanbanBtn").onclick=()=>{
  $("kanbanView").style.display='grid';
  $("tableView").style.display='none';
};
$("tableBtn").onclick=()=>{
  $("kanbanView").style.display='none';
  $("tableView").style.display='block';
};

$("search").oninput=render;

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&e.target.tagName!=="TEXTAREA"){
    e.preventDefault();
    $("addBtn").click();
  }
});

render();
recommend();
</script>

</body>
</html>
``
