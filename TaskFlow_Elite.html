<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TaskFlow Pro</title>

<style>
:root{
--bg:#0f172a;
--panel:#111827;
--border:#1f2937;
--text:#e5e7eb;
--muted:#9ca3af;
--accent:#2563eb;
--danger:#dc2626;
--success:#16a34a;
}

body{
  margin:0;
  font-family:Segoe UI,system-ui;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.glass{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
}

/* フォーム */
.form{
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 2fr auto;
  gap:8px;
}

input,select,textarea{
  background:#0b1220;
  border:1px solid var(--border);
  color:var(--text);
  padding:8px;
  border-radius:8px;
}

textarea{height:34px;resize:none;}

button{
  border:none;
  background:#1f2937;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{background:#374151;}

.primary{
  background:var(--accent);
  font-weight:bold;
}

/* テーブル */
table{width:100%;border-collapse:collapse;font-size:14px;}
th{color:var(--muted);text-align:left;border-bottom:1px solid var(--border);}
td{border-bottom:1px solid var(--border);}
tr:hover{background:#1f2937;}

.badge{
  padding:3px 8px;
  border-radius:999px;
  font-size:12px;
}
.高{background:var(--danger);}
.中{background:#d97706;}
.低{background:var(--success);}

.progress{height:6px;background:#374151;border-radius:99px;}
.fill{height:100%;background:var(--accent);}

/* カンバン */
.kanban{display:none;grid-template-columns:repeat(3,1fr);gap:12px;}
.col{padding:10px;min-height:300px;}
.task{padding:8px;margin:6px 0;background:#1f2937;border-radius:8px;}

.editable{cursor:pointer;}
</style>

</head>
<body>

<div class="wrap">

<h2>TaskFlow Pro</h2>

<div class="glass form">
<input id="name" placeholder="タスク名">
<select id="priority"><option>高</option><option selected>中</option><option>低</option></select>
<input id="deadline" type="date">
<input id="estimate" type="number" placeholder="予想">
<input id="actual" type="number" placeholder="実績">
<input id="progressNum" type="number" min="0" max="100" value="0">
<textarea id="memo" placeholder="メモ"></textarea>
<button type="button" class="primary" onclick="addTask()">＋</button>
</div>

<div class="glass">
<input id="search" placeholder="検索" oninput="render()">
<select id="filterPriority" onchange="render()">
<option value="">全優先度</option>
<option>高</option><option>中</option><option>低</option>
</select>

<select id="sort" onchange="render()">
<option value="deadline">期限</option>
<option value="priority">優先度</option>
<option value="progress">進捗</option>
</select>

<button onclick="viewTable()">一覧</button>
<button onclick="viewKanban()">カンバン</button>
<button onclick="exportCSV()">CSV</button>
<input type="file" onchange="importCSV(event)">
</div>

<div id="tableView" class="glass">
<table>
<thead>
<tr>
<th>タスク</th><th>優先</th><th>期限</th><th>進捗</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div id="kanbanView" class="kanban">
<div class="glass col"><h3>未着手</h3><div id="todo"></div></div>
<div class="glass col"><h3>進行中</h3><div id="doing"></div></div>
<div class="glass col"><h3>完了</h3><div id="done"></div></div>
</div>

</div>

<script>
let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');

function save(){localStorage.setItem('tasks',JSON.stringify(tasks));render();}

function addTask(){
if(!name.value.trim()){alert("タスク名必須");return;}

let p=+progressNum.value||0;

tasks.push({
id:Date.now(),
name:name.value,
priority:priority.value,
deadline:deadline.value,
progress:p,
memo:memo.value,
status:p==0?'未着手':p==100?'完了':'進行中'
});

name.value='';deadline.value='';progressNum.value=0;memo.value='';
save();
}

/* 編集 */
function edit(id,key,value){
let t=tasks.find(x=>x.id==id);
t[key]=value;
save();
}

/* render */
function render(){
let q=search.value.toLowerCase();
let f=filterPriority.value;

let arr=tasks.filter(t=>t.name.toLowerCase().includes(q));
if(f)arr=arr.filter(t=>t.priority==f);

/* 並び替え */
let s=sort.value;
arr.sort((a,b)=>{
if(s=='deadline') return (a.deadline||'9999').localeCompare(b.deadline||'9999');
if(s=='progress') return b.progress-a.progress;
if(s=='priority') return ['高','中','低'].indexOf(a.priority)-['高','中','低'].indexOf(b.priority);
});

tbody.innerHTML='';todo.innerHTML='';doing.innerHTML='';done.innerHTML='';

arr.forEach(t=>{

tbody.innerHTML+=`
<tr>
<td contenteditable class="editable" onblur="edit(${t.id},'name',this.innerText)">${t.name}</td>
<td>${t.priority}</td>
<td>${t.deadline||''}</td>
<td>
<div class="progress"><div class="fill" style="width:${t.progress}%"></div></div>
${t.progress}%
</td>
<td><button onclick="del(${t.id})">🗑</button></td>
</tr>
`;

/* カンバン */
let c=document.createElement('div');
c.className='task';
c.textContent=t.name+" "+t.progress+"%";
document.getElementById(
t.status=='未着手'?'todo':
t.status=='進行中'?'doing':'done'
).appendChild(c);

});

}

/* 削除 */
function del(id){
tasks=tasks.filter(t=>t.id!=id);
save();
}

/* CSV */
function exportCSV(){
let r=['name,priority,deadline,progress'];
tasks.forEach(t=>r.push([t.name,t.priority,t.deadline,t.progress].join(',')));
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([r.join('\n')]));
a.download='tasks.csv';
a.click();
}

function importCSV(e){
let f=e.target.files[0];
let rd=new FileReader();
rd.onload=x=>{
x.target.result.split('\n').slice(1).forEach(l=>{
let c=l.split(',');
tasks.push({
id:Date.now()+Math.random(),
name:c[0],
priority:c[1],
deadline:c[2],
progress:+c[3],
status:'未着手'
});
});
save();
};
rd.readAsText(f);
}

/* view */
function viewKanban(){kanbanView.style.display='grid';tableView.style.display='none';}
function viewTable(){kanbanView.style.display='none';tableView.style.display='block';}

/* Enter追加 */
document.addEventListener('keydown',e=>{
if(e.key==='Enter') addTask();
});

render();
</script>

</body>
</html>
