
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow AI Pro</title>

<style>
:root{
--bg:#0b1020;
--panel:#111827;
--border:#1f2937;
--text:#e5e7eb;
--muted:#9ca3af;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Segoe UI,Inter;
}

.wrap{max-width:900px;margin:auto;padding:20px;}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:12px;
padding:14px;
margin-bottom:12px;
}

button{
background:#1f2937;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
button:hover{background:#374151;}

input,select{
background:#0f172a;
border:1px solid var(--border);
color:white;
padding:6px;
border-radius:6px;
}

.small{font-size:12px;color:var(--muted);}

/* タスクカード */
.task{
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid var(--border);
}

.task-title{font-weight:bold;font-size:16px;margin-bottom:4px;}
.task-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}

.progress{
height:6px;
background:#1f2937;
border-radius:6px;
overflow:hidden;
}
.progress-bar{
height:100%;
background:#3b82f6;
}

/* 状態色 */
.red{color:#ef4444;}
.orange{color:#f97316;}
.yellow{color:#facc15;}
.green{color:#22c55e;}
.gray{color:#6b7280;}

.kanban{
display:none;
grid-template-columns:repeat(3,1fr);
gap:10px;
}
</style>

</head>
<body>

<div class="wrap">

<h2>🤖 TaskFlow AI Pro</h2>

<div class="card" id="recommend"></div>

<div class="card">
<b>📆 今週</b>
<div id="week"></div>
</div>

<div class="card">
<input id="name" placeholder="タスク">
<select id="priority"><option>高</option><option>中</option><option>低</option></select>
<input id="deadline" type="date">
<input id="estimate" type="number" placeholder="日数">
<input id="memo" placeholder="メモ">
<button onclick="add()">追加</button>
</div>

<div class="card">
<button onclick="ai()">AI整理</button>
<button onclick="viewList()">一覧</button>
<button onclick="viewKanban()">カンバン</button>
</div>

<div id="list"></div>

<div id="kanban" class="kanban">
<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">
<h4>未着手</h4><div id="todo"></div></div>

<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">
<h4>進行中</h4><div id="doing"></div></div>

<div class="card" ondrop="drop(event,'待機')" ondragover="allowDrop(event)">
<h4>待機</h4><div id="waiting"></div></div>
</div>

<div class="card">
<h3>🕓ログ</h3>
<div id="log" class="small"></div>
</div>

</div>

<script>

const $=id=>document.getElementById(id);

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
let logs=JSON.parse(localStorage.getItem("logs")||"[]");

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
render();
recommend();
week();
renderLog();
}

function log(t){
logs.unshift(new Date().toLocaleString()+" "+t);
logs=logs.slice(0,50);
localStorage.setItem("logs",JSON.stringify(logs));
}

/* スコア（軽量版） */
function analyze(t){
let score=0,reasons=[],now=new Date();

if(t.progress<100){score+=100;reasons.push("未完了");}

if(!t.deadline){
score-=120;
reasons.push("期限なし");
return{score,reasons};
}

let d=(new Date(t.deadline)-now)/86400000;

score+=30-d;
reasons.push(`残${Math.round(d)}日`);

if(d<0){score+=100;reasons.push("遅延");}
else if(d<1){score+=40;reasons.push("締切直前");}

if(t.estimate>d){
score+=(t.estimate-d)*20;
reasons.push("工数不足");
}

score+=(100-(t.progress||0))*0.5;

if(t.priority==="高"){
score+=30;
reasons.push("高優先");
}

return{score,reasons};
}

function status(t){
let d=t.deadline?(new Date(t.deadline)-new Date())/86400000:null;

if(t.progress===100)return["完了","green"];
if(!t.deadline)return["backlog","gray"];
if(d<0)return["遅延","red"];
if(t.estimate>d)return["危険","orange"];
if(d<2)return["注意","yellow"];
return["正常","green"];
}

function add(){
if(!$("name").value)return;

tasks.push({
id:Date.now(),
name:$("name").value,
priority:$("priority").value,
deadline:$("deadline").value,
estimate:+$("estimate").value||1,
progress:0,
memo:$("memo").value,
status:"未着手"
});

log("追加："+$("name").value);
save();
}

function ai(){
tasks.sort((a,b)=>analyze(b).score-analyze(a).score);
log("AI整理");
save();
}

function recommend(){
let list=tasks.filter(t=>t.deadline&&t.progress<100);

if(!list.length){
$("recommend").innerText="OK";
return;
}

let best=list.sort((a,b)=>analyze(b).score-analyze(a).score)[0];
let a=analyze(best);

$("recommend").innerHTML=
`🔥 今やるべき<br>
<b>${best.name}</b>
<div class="small">${a.reasons.join(" / ")}</div>`;
}

function week(){
let now=new Date();

let list=tasks.filter(t=>{
if(!t.deadline)return false;
let d=new Date(t.deadline);
return (d-now)/86400000<=7;
});

let total=list.reduce((s,t)=>s+t.estimate,0);

$("week").innerHTML=
`合計工数：${total}日<br>
${list.map(t=>t.name).join("<br>")||"なし"}`;
}

function render(){

$("list").innerHTML="";
["todo","doing","waiting"].forEach(id=>$(id).innerHTML="");

tasks.forEach(t=>{

let a=analyze(t);
let st=status(t);

let card=document.createElement("div");
card.className="task";

card.innerHTML=
`
<div class="task-title">${t.name}</div>

<div class="${st[1]}">${st[0]}</div>

<div class="task-row small">
<span>${a.reasons.join(" / ")}</span>
<span>${t.priority==="高"?"🔥":t.priority==="中"?"⚡":"・"}</span>
</div>

<div class="task-row">
<span>残${Math.round(t.estimate*(1-(t.progress||0)/100))}日</span>
<span>${t.progress||0}%</span>
</div>

<div class="progress">
<div class="progress-bar" style="width:${t.progress||0}%"></div>
</div>
`;

$("list").appendChild(card);

/* カンバン */
let k=document.createElement("div");
k.className="task";
k.textContent=`${t.name} (${t.progress||0}%)`;
k.draggable=true;
k.ondragstart=e=>e.dataTransfer.setData("id",t.id);

if(t.status!=="完了"){
let m={未着手:"todo",進行中:"doing",待機:"waiting"}[t.status];
if(m) $(m).appendChild(k);
}

});

}

function renderLog(){
$("log").innerHTML=logs.join("<br>");
}

function allowDrop(e){e.preventDefault();}

function drop(e,status){
let id=+e.dataTransfer.getData("id");
let t=tasks.find(x=>x.id==id);
t.status=status;
log(`状態変更：${t.name}→${status}`);

if(status==="完了"){
t.progress=100;
log("完了："+t.name);
}

save();
}

function viewKanban(){
$("kanban").style.display="grid";
$("list").style.display="none";
}

function viewList(){
$("kanban").style.display="none";
$("list").style.display="block";
}

render();
recommend();
week();
renderLog();

</script>

</body>
</html>
