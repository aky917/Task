<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TaskFlow FINAL</title>

<style>
body{background:#0f172a;color:#e5e7eb;font-family:sans-serif;margin:0}
.wrap{max-width:1800px;margin:auto;padding:20px 40px}
.card{background:#1e293b;border:1px solid #1f2937;border-radius:12px;padding:14px;margin-bottom:14px}

button,input,select,textarea{
background:#0f172a;border:1px solid #1f2937;color:white;padding:6px;border-radius:6px;
transition:.15s;cursor:pointer;
}

/* ボタン */
button:hover{background:#1f2937;transform:translateY(-1px);}
button:active{transform:translateY(1px) scale(0.97);filter:brightness(.85);}
button:focus{outline:1px solid #3b82f6;}

#addBtn{background:#2563eb;}
#addBtn:hover{background:#3b82f6;}
button[onclick*="del"]{background:#7f1d1d;}
button[onclick*="del"]:hover{background:#b91c1c;}

/* フラッシュ */
.flash{animation:flash .6s;}
@keyframes flash{
50%{box-shadow:0 0 20px rgba(59,130,246,.8)}
}

/* 入力バー */
.formbar{display:flex;gap:10px;align-items:end;flex-wrap:wrap}
#name{width:240px}
#memo{width:200px}
#estimate{width:70px}
label{font-size:11px;color:#9ca3af}
.subbtns{display:flex;gap:6px}

/* date */
input[type="date"]{color-scheme:dark}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);cursor:pointer}

/* テーブル */
table{width:100%;table-layout:fixed;border-collapse:collapse}
th,td{padding:8px;border-top:1px solid #1f2937}
th{color:#9ca3af}
tbody tr:hover{background:#273449}


th { text-align:left; font-weight:600; }
td { vertical-align:middle; }

th:nth-child(1), td:nth-child(1){width:24%; text-align:left;}
th:nth-child(2), td:nth-child(2){width:6%;  text-align:center;}
th:nth-child(3), td:nth-child(3){width:12%; text-align:center;}
th:nth-child(4), td:nth-child(4){width:12%; text-align:center; font-size:12px;}
th:nth-child(5), td:nth-child(5){width:14%; text-align:right; font-family:monospace;}
th:nth-child(6), td:nth-child(6){width:22%; text-align:left;}
th:nth-child(7), td:nth-child(7){width:10%; text-align:right;}


/* 優先 */
.badge{width:12px;height:12px;border-radius:50%;display:inline-block}
.高{background:#ef4444}
.中{background:#3b82f6}
.低{background:#22c55e}

/* カンバン */
.kanban{display:none;grid-template-columns:repeat(4,1fr);gap:16px}
.task{
padding:8px;margin:6px;border-radius:8px;
cursor:pointer;font-size:12px;transition:.2s;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.task:hover{transform:scale(1.02)}
.small{font-size:10px;color:#9ca3af}

/* トースト */
#toast{
position:fixed;bottom:20px;right:20px;
background:#16a34a;color:white;
padding:10px 16px;border-radius:8px;
opacity:0;transform:translateY(10px);
transition:.3s;
}
</style>
</head>

<body>
<div class="wrap">

<h2>TaskFlow</h2>

<div class="card"><b>今日の流れ</b><div id="today"></div></div>

<div class="card"><input id="search" placeholder="検索" style="width:100%"></div>

<div class="card formbar">
<div><label>タスク</label><br><input id="name" placeholder="例：資料作成"></div>
<div><label>優先</label><br>
<select id="priority"><option>高</option><option>中</option><option>低</option></select></div>
<div><label>期限</label><br><input id="deadline" type="date"></div>
<div><label>工数(h)</label><br><input id="estimate" type="number" step="0.5"></div>
<div><label>メモ</label><br><input id="memo"></div>
<div><button id="addBtn">追加</button></div>

<div class="subbtns">
<button onclick="copyReport()">週報</button>
<button onclick="exportTasks()">保存</button>
<input type="file" id="file" style="display:none" onchange="importTasks(event)">
<button onclick="$('file').click()">復元</button>
</div>
</div>

<div class="card">
<button id="btnList">一覧</button>
<button id="btnBoard">カンバン</button>
</div>

<div id="list" class="card">
<table>
<thead><tr>
<th>タスク</th><th>優先</th><th>状態</th>
<th>期限</th><th>進捗</th><th>メモ</th><th></th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>

<h3 onclick="toggleDone()">完了 (<span id="doneCount"></span>)</h3>
<div id="doneWrap" style="display:none">
<table><tbody id="done"></tbody></table>
</div>
</div>

<div id="board" class="kanban">
<div class="card" ondrop="drop(event,'未着手')" ondragover="allowDrop(event)">未着手<div id="todo"></div></div>
<div class="card" ondrop="drop(event,'進行中')" ondragover="allowDrop(event)">進行中<div id="doing"></div></div>
<div class="card" ondrop="drop(event,'待機')" ondragover="allowDrop(event)">待機<div id="waiting"></div></div>
<div class="card" ondrop="drop(event,'完了')" ondragover="allowDrop(event)">完了<div id="doneK"></div></div>
</div>

<!-- モーダル -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7)">
<div style="background:#111827;padding:20px;margin:100px auto;width:340px;border-radius:12px">

<label>タスク</label><input id="m_name" style="width:100%"><br><br>
<label>優先度</label>
<select id="m_priority" style="width:100%">
<option>高</option><option>中</option><option>低</option>
</select><br><br>
<label>期限</label><input id="m_deadline" type="date" style="width:100%"><br><br>
<label>工数</label><input id="m_estimate" style="width:100%"><br><br>
<label>進捗</label><input id="m_progress" type="number" min="0" max="100" style="width:100%"><br><br>
<label>メモ</label><textarea id="m_memo" style="width:100%"></textarea><br><br>
<div style="display:flex;gap:10px;justify-content:flex-end">
<button onclick="saveModal()">保存</button>
<button onclick="closeModal()">閉じる</button>
</div>

</div>
</div>

<div id="toast">保存しました</div>

</div>




<script>
const $=id=>document.getElementById(id);
const DAY_HOURS=8;

let tasks;
try{
  tasks=JSON.parse(localStorage.getItem("tasks")||"[]");
}catch{
  tasks=[];
}

let keyword="",showDone=false,currentId=null;
let lastDeleted=null;

/* ✅ XSS対策 */
function esc(str){
  return (str||"").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[s]));
}

/* 安全日付 */
function safeDate(d){
  return d?new Date(d):new Date("2999-12-31");
}

/* 保存 */
function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
  render();
  showToast();
}

/* Toast */
function showToast(msg="保存しました"){
let t=$("toast");
t.innerText=msg;
t.style.opacity=1;
t.style.transform="translateY(0)";
setTimeout(()=>{
t.style.opacity=0;
t.style.transform="translateY(10px)";
},1200);
}

/* ✅ Undo */
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.key==="z"){
    if(lastDeleted){
      tasks.push(lastDeleted);
      lastDeleted=null;
      save();
      showToast("元に戻しました");
    }
  }
});

/* ✅ Enter */
document.addEventListener("keydown",e=>{
if(e.key==="Enter" && document.activeElement.tagName!=="TEXTAREA"){
$("addBtn").click();
}
});

/* ✅ Ctrl+S */
document.addEventListener("keydown",e=>{
if(e.ctrlKey && e.key==="s"){
e.preventDefault();
save();
}
});

/* 検索 */
$("search").oninput=e=>{
keyword=e.target.value.toLowerCase();
render();
};

/* ✅ 改善③ 待機保護 */
function autoStatus(){
tasks.forEach(t=>{
  if(t.progress>=100){
    t.status="完了";
  }else if(t.status==="待機"){
    return;
  }else{
    t.status=t.progress>0?"進行中":"未着手";
  }
});
}

/* 追加 */
$("addBtn").onclick=()=>{
if(!$("name").value.trim()) return;

tasks.push({
id:Date.now(),
name:$("name").value,
priority:$("priority").value,
deadline:$("deadline").value,
estimate:+$("estimate").value||1,
progress:0,
memo:$("memo").value,
status:"未着手"
});

["name","deadline","estimate","memo"].forEach(i=>$(i).value="");
save();
};

/* スコア */
function score(t){
const p={高:3,中:2,低:1};
let d=(safeDate(t.deadline)-new Date())/86400000;
return (p[t.priority]*10)-d-t.estimate;
}

/* 並び */
function sortTasks(){
tasks.sort((a,b)=>score(b)-score(a));
}

/* 状態 */
function status(t){
if(t.status==="待機") return "⏸ 待機";
if(!t.deadline) return "🗂 バックログ";
let d=(safeDate(t.deadline)-new Date())/86400000*DAY_HOURS;
if(d<0) return "🔥 遅延";
if(t.estimate>d) return "⚠ 危険";
if(d<DAY_HOURS*2) return "⏳ 注意";
return "✅ 正常";
}

/* today */
function renderToday(){
let h=DAY_HOURS,today=[],carry=[];
tasks
.filter(t=>t.progress<100)
.sort((a,b)=>score(b)-score(a))
.forEach(t=>{
let r=t.estimate*(1-t.progress/100);
if(h>0){
let use=Math.min(h,r);
today.push(`・${esc(t.name)} (${use.toFixed(1)}h)`);
h-=use;
if(r>use)carry.push(`・${esc(t.name)} 残${(r-use).toFixed(1)}h`);
}else{
carry.push(`・${esc(t.name)} (${r.toFixed(1)}h)`);
}
});
$("today").innerHTML=today.join("<br>")||"なし";
}

/* 描画 */
function render(){
autoStatus();
sortTasks();

$("tbody").innerHTML="";
tasks.forEach(t=>{

if(keyword && !t.name.toLowerCase().includes(keyword) && !(t.memo||"").toLowerCase().includes(keyword)) return;

let remain=t.estimate*(1-t.progress/100);

$("tbody").innerHTML+=`
<tr>
<td onclick="edit(${t.id})">${esc(t.name)}</td>
<td>${t.priority}</td>
<td>${status(t)}</td>
<td>${t.deadline||""}</td>
<td>
${t.progress}% (${remain.toFixed(1)}h)
<button onclick="quickProgress(${t.id});event.stopPropagation()">＋</button>
</td>
<td>${esc(t.memo)}</td>
<td>
<button onclick="toggleWait(${t.id});event.stopPropagation()">⏸</button>
<button onclick="del(${t.id});event.stopPropagation()">×</button>
</td>
</tr>`;
});

renderToday();
}

/* 進捗＋ */
function quickProgress(id){
let t=tasks.find(x=>x.id==id);
t.progress=Math.min(100,t.progress+10);
save();
}

/* 編集 */
function edit(id){
let t=tasks.find(x=>x.id==id);
currentId=id;
$("m_name").value=t.name;
$("m_priority").value=t.priority;
$("m_deadline").value=t.deadline||"";
$("m_estimate").value=t.estimate;
$("m_progress").value=t.progress;
$("m_memo").value=t.memo||"";
$("modal").style.display="block";
}

/* ✅ 改善①② */
function saveModal(){
let t=tasks.find(x=>x.id==currentId);

t.name=$("m_name").value;
t.priority=$("m_priority").value;
t.deadline=$("m_deadline").value;
t.estimate=+$("m_estimate").value||1;

/* ✅ progress制限 */
t.progress=Math.max(0,Math.min(100,Math.floor(+$("m_progress").value||0)));

t.memo=$("m_memo").value;

if(t.progress>=100)t.status="完了";

closeModal();
save();
}

function closeModal(){ $("modal").style.display="none"; }

/* ✅ 削除（Undo付き） */
function del(id){
const index=tasks.findIndex(t=>t.id==id);
if(index===-1)return;

lastDeleted=tasks[index];
tasks.splice(index,1);
save();

showToast("削除しました（Ctrl+Zで戻せます）");
}

function toggleWait(id){
let t=tasks.find(x=>x.id==id);
t.status=t.status==="待機"?"進行中":"待機";
save();
}

/* 初期 */
render();
</script>

  
  
</body>
</html>
